<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professors — Scanora Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">

    <aside class="sidebar">
        <a class="sidebar-brand" href="admin.html">
            <div class="sidebar-logo-icon"><i class="bi bi-person-bounding-box"></i></div>
            Scanora
        </a>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <a class="btn btn-primary w-100" href="attendance.html">
                <i class="bi bi-lightning-charge"></i> Quick Scan
            </a>
        </div>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <div>
                <a href="admin.html" style="color:var(--text-muted);text-decoration:none;font-size:0.78rem;display:inline-flex;align-items:center;gap:4px;margin-bottom:0.5rem;">
                    <i class="bi bi-arrow-left"></i> Dashboard
                </a>
                <div class="badge badge-cyan" style="margin-bottom:0.5rem;">
                    <i class="bi bi-person-video2"></i> Professors Module
                </div>
                <h2 class="page-title">Manage Professors</h2>
            </div>
            <div id="profCount" class="badge badge-cyan" style="font-size:0.8rem;padding:0.4rem 0.9rem;"></div>
        </div>

        <div style="display:grid;grid-template-columns:360px 1fr;gap:1.25rem;align-items:start;">

            <!-- Add Professor Card -->
            <div class="card" style="position:sticky;top:1rem;">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">
                    <div style="width:36px;height:36px;border-radius:10px;background:rgba(12,166,120,0.12);display:flex;align-items:center;justify-content:center;">
                        <i class="bi bi-person-plus" style="color:var(--cyan);font-size:1rem;"></i>
                    </div>
                    <div>
                        <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary);">Add New Professor</div>
                        <div style="font-size:0.72rem;color:var(--text-muted);">Create login credentials + assign courses</div>
                    </div>
                </div>

                <div id="profError" style="display:none;" class="alert-error"></div>

                <form id="addProfForm" style="display:flex;flex-direction:column;gap:0.875rem;">
                    <div>
                        <label class="form-label">Full Name</label>
                        <input class="form-control" id="profName" placeholder="Dr. Ravi Kumar" required>
                    </div>
                    <div>
                        <label class="form-label">Employee ID</label>
                        <input class="form-control" id="profEmpId" placeholder="EMP001" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input class="form-control" type="email" id="profEmail" placeholder="ravi@college.edu" required>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.625rem;">
                        <div>
                            <label class="form-label">Username</label>
                            <input class="form-control" id="profUsername" placeholder="ravi.kumar" required>
                        </div>
                        <div>
                            <label class="form-label">Password</label>
                            <input class="form-control" type="password" id="profPassword" placeholder="Min. 6 chars" required>
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Assign Courses</label>
                        <div id="courseCheckboxes" style="display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto;padding:0.75rem;background:var(--bg-elevated);border-radius:var(--r-md);border:1px solid var(--border);">
                            <div style="color:var(--text-muted);font-size:0.8rem;">Loading...</div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top:0.25rem;">
                        <i class="bi bi-plus-circle"></i> Add Professor
                    </button>
                </form>
            </div>

            <!-- Professor List -->
            <div>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.875rem;">
                    <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary);">All Professors</div>
                    <button class="btn btn-sm btn-outline" onclick="loadProfessors()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
                </div>
                <div id="professorGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;">
                    <div class="skeleton-row" style="height:120px;"></div>
                    <div class="skeleton-row" style="height:120px;"></div>
                </div>
            </div>

        </div>
    </main>
</div>

<!-- Edit Courses Modal -->
<div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.75rem;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.6);">
        <div style="font-weight:800;font-size:1rem;color:var(--text-primary);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;">
            <i class="bi bi-pencil-square" style="color:var(--cyan);"></i>
            Edit Courses — <span id="editProfName"></span>
        </div>
        <div id="editCourseBoxes" style="display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;padding:0.75rem;background:var(--bg-elevated);border-radius:var(--r-md);border:1px solid var(--border);margin-bottom:1.25rem;"></div>
        <div style="display:flex;gap:0.625rem;">
            <button class="btn btn-primary" onclick="saveEditCourses()"><i class="bi bi-check-lg"></i> Save</button>
            <button class="btn btn-sm btn-outline" style="padding:0.55rem 1rem;" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/toast.js"></script>

<script>
Auth.requireRole(['admin']);
Auth.renderSidebar();

let allCourses = [];
let editingProfId = null;

async function init() {
    try {
        const { courses } = await API.getCourses();
        allCourses = courses;
        renderCourseCheckboxes('courseCheckboxes', []);
    } catch {}
    loadProfessors();
}

function renderCourseCheckboxes(containerId, selected) {
    document.getElementById(containerId).innerHTML = allCourses.map(c => `
        <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;cursor:pointer;padding:4px 0;">
            <input type="checkbox" value="${c.id}" ${selected.includes(c.id) ? 'checked' : ''} style="accent-color:var(--cyan);width:14px;height:14px;">
            <span style="color:var(--text-secondary);">${c.name} <span class="badge badge-cyan" style="font-size:0.62rem;padding:1px 6px;">${c.code}</span></span>
        </label>
    `).join('');
}

async function loadProfessors() {
    const grid = document.getElementById('professorGrid');
    grid.innerHTML = '<div class="skeleton-row" style="height:120px;"></div><div class="skeleton-row" style="height:120px;"></div>';
    try {
        const { professors } = await API.admin.getProfessors();
        document.getElementById('profCount').textContent = `${professors.length} professors`;

        if (!professors.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:3rem;font-size:0.85rem;">No professors added yet. Use the form to add your first professor.</div>';
            return;
        }
        grid.innerHTML = professors.map(p => `
            <div class="card" style="border-top:2px solid var(--cyan);padding:1.1rem;transition:transform 0.15s,box-shadow 0.15s;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 32px rgba(0,0,0,0.35)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:0.875rem;">
                    <div style="width:40px;height:40px;border-radius:50%;background:rgba(12,166,120,0.12);border:1.5px solid rgba(12,166,120,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem;font-weight:800;color:var(--cyan);">${p.name.charAt(0)}</div>
                    <div style="min-width:0;">
                        <div style="font-weight:800;font-size:0.9rem;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</div>
                        <div style="font-size:0.72rem;color:var(--text-muted);">@${p.username} · ${p.employee_id}</div>
                    </div>
                </div>
                <div style="font-size:0.72rem;color:var(--text-muted);margin-bottom:6px;">Courses assigned:</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px;min-height:24px;">
                    ${p.courses.length ? p.courses.map(c => `<span class="badge badge-cyan" style="font-size:0.65rem;padding:2px 8px;">${c.code}</span>`).join('') : '<span style="color:var(--text-muted);font-size:0.75rem;font-style:italic;">None assigned</span>'}
                </div>
                <div style="display:flex;gap:6px;margin-top:0.875rem;padding-top:0.75rem;border-top:1px solid var(--border);">
                    <button class="btn btn-sm btn-outline" style="flex:1;" onclick="openEditModal(${p.id}, '${p.name}', [${p.courses.map(c=>c.id).join(',')}])">
                        <i class="bi bi-pencil"></i> Edit Courses
                    </button>
                    <button class="btn btn-sm" style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);color:var(--red);" onclick="deleteProfessor(${p.id},'${p.name}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        grid.innerHTML = `<div style="grid-column:1/-1;color:var(--red);text-align:center;padding:2rem;">${err.message}</div>`;
    }
}

document.getElementById('addProfForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('profError');
    errEl.style.display = 'none';
    const courseIds = [...document.querySelectorAll('#courseCheckboxes input:checked')].map(i => parseInt(i.value));
    try {
        await API.admin.addProfessor({
            name: document.getElementById('profName').value.trim(),
            employee_id: document.getElementById('profEmpId').value.trim(),
            email: document.getElementById('profEmail').value.trim(),
            username: document.getElementById('profUsername').value.trim(),
            password: document.getElementById('profPassword').value,
            course_ids: courseIds,
        });
        Toast.success('Professor added successfully');
        e.target.reset();
        renderCourseCheckboxes('courseCheckboxes', []);
        loadProfessors();
    } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
    }
});

async function deleteProfessor(id, name) {
    if (!confirm(`Remove "${name}"? Their account and lecture history will be deleted.`)) return;
    try {
        await API.admin.deleteProfessor(id);
        Toast.success(`${name} removed`);
        loadProfessors();
    } catch (err) { Toast.error(err.message); }
}

function openEditModal(id, name, courseIds) {
    editingProfId = id;
    document.getElementById('editProfName').textContent = name;
    renderCourseCheckboxes('editCourseBoxes', courseIds);
    const modal = document.getElementById('editModal');
    modal.style.display = 'flex';
}
function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    editingProfId = null;
}
async function saveEditCourses() {
    const courseIds = [...document.querySelectorAll('#editCourseBoxes input:checked')].map(i => parseInt(i.value));
    try {
        await API.admin.updateProfessorCourses(editingProfId, courseIds);
        Toast.success('Courses updated');
        closeEditModal();
        loadProfessors();
    } catch (err) { Toast.error(err.message); }
}

document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal')) closeEditModal();
});

init();
</script>

<style>
.btn-outline {
    background:transparent;border:1px solid var(--border);color:var(--text-secondary);
    padding:0.5rem 0.875rem;border-radius:var(--r-md);font-size:0.875rem;cursor:pointer;
    transition:border-color var(--t-base),color var(--t-base);display:inline-flex;
    align-items:center;gap:0.4rem;text-decoration:none;
}
.btn-outline:hover { border-color:var(--cyan);color:var(--cyan); }
</style>
</body>
</html>
