<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SMAART</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1;">

    <div style="width:100%;max-width:420px;">

        <!-- Brand -->
        <div style="text-align:center;margin-bottom:2.5rem;">
            <div style="width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,rgba(61,90,241,0.15),rgba(12,166,120,0.08));border:1px solid rgba(61,90,241,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.5rem;">
                <i class="bi bi-person-bounding-box" style="color:var(--purple-light);"></i>
            </div>
            <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:0.25rem;">
                SMAART
            </h1>
            <p style="color:var(--text-muted);font-size:0.85rem;">Smart Attendance System — Sign in to continue</p>
        </div>

        <!-- Card -->
        <div class="card" style="padding:2rem;">

            <div id="errorMsg" style="display:none;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:var(--r-md);padding:0.75rem 1rem;font-size:0.82rem;color:var(--red);margin-bottom:1.25rem;"></div>

            <form id="loginForm">
                <div style="margin-bottom:1.25rem;">
                    <label style="display:block;font-size:0.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.06em;">Username or Email</label>
                    <div style="position:relative;">
                        <i class="bi bi-person" style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.9rem;"></i>
                        <input id="username" type="text" class="form-control" placeholder="Enter your username or email"
                               style="padding-left:2.5rem;" autocomplete="username" required>
                    </div>
                </div>

                <div style="margin-bottom:1.5rem;">
                    <label style="display:block;font-size:0.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.06em;">Password</label>
                    <div style="position:relative;">
                        <i class="bi bi-lock" style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.9rem;"></i>
                        <input id="password" type="password" class="form-control" placeholder="Enter your password"
                               style="padding-left:2.5rem;" autocomplete="current-password" required>
                        <button type="button" id="togglePw" style="position:absolute;right:0.875rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;padding:0;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary w-100" style="padding:0.75rem;font-size:0.95rem;font-weight:700;">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <div style="border-top:1px solid var(--border);margin-top:1.5rem;padding-top:1.25rem;text-align:center;">
                <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:0.5rem;">New student? Create your account</p>
                <a href="register.html" class="btn btn-outline w-100" style="font-size:0.85rem;">
                    <i class="bi bi-person-plus"></i> Register with Face ID
                </a>
            </div>
        </div>

        <!-- Role hints -->
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-top:1.25rem;">
            <div style="text-align:center;padding:0.625rem;background:var(--bg-surface);border-radius:var(--r-md);border:1px solid var(--border);">
                <i class="bi bi-shield-lock" style="color:var(--pink);font-size:1rem;display:block;margin-bottom:3px;"></i>
                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Admin</div>
            </div>
            <div style="text-align:center;padding:0.625rem;background:var(--bg-surface);border-radius:var(--r-md);border:1px solid var(--border);">
                <i class="bi bi-easel" style="color:var(--cyan);font-size:1rem;display:block;margin-bottom:3px;"></i>
                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Professor</div>
            </div>
            <div style="text-align:center;padding:0.625rem;background:var(--bg-surface);border-radius:var(--r-md);border:1px solid var(--border);">
                <i class="bi bi-mortarboard" style="color:var(--green);font-size:1rem;display:block;margin-bottom:3px;"></i>
                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Student</div>
            </div>
        </div>

        <p style="text-align:center;margin-top:1rem;font-size:0.72rem;color:var(--text-muted);">
            Default admin: <strong style="color:var(--text-secondary);">admin / admin123</strong>
        </p>

    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
    // Already logged in → redirect
    if (Auth.isLoggedIn()) {
        const user = Auth.getUser();
        if (user) window.location.href = Auth.roleHome(user.role);
    }

    document.getElementById('togglePw').addEventListener('click', () => {
        const pw = document.getElementById('password');
        const icon = document.querySelector('#togglePw i');
        if (pw.type === 'password') {
            pw.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            pw.type = 'password';
            icon.className = 'bi bi-eye';
        }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');
        errEl.style.display = 'none';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.innerHTML = '<span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px;vertical-align:middle;"></span> Signing in...';

        try {
            const data = await fetch(`${CONFIG.API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password }),
            }).then(async r => {
                const d = await r.json();
                if (!r.ok) throw new Error(d.error || 'Login failed');
                return d;
            });

            const profile = data.professor || data.student || null;
            Auth.setAuth(data.token, data.user, profile);
            window.location.href = Auth.roleHome(data.user.role);
        } catch (err) {
            errEl.textContent = err.message;
            errEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        }
    });
</script>

<style>
@keyframes spin { to { transform: rotate(360deg); } }

.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.55rem 1rem;
    border-radius: var(--r-md);
    font-size: 0.875rem;
    cursor: pointer;
    transition: border-color var(--t-base), color var(--t-base);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    justify-content: center;
    text-decoration: none;
    width: 100%;
}
.btn-outline:hover {
    border-color: var(--purple-light);
    color: var(--purple-light);
}
</style>
</body>
</html>
