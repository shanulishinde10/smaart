<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner — SMAART</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <a class="sidebar-brand" href="index.html">
                <div class="sidebar-logo-icon">
                    <i class="bi bi-person-bounding-box"></i>
                </div>
                SMAART
            </a>
            <nav class="sidebar-nav">
                <a class="nav-link" href="index.html">
                    <i class="bi bi-house-door"></i> Home
                </a>
                <a class="nav-link" href="register.html">
                    <i class="bi bi-person-plus"></i> Register
                </a>
                <a class="nav-link active" href="attendance.html">
                    <i class="bi bi-camera"></i> Scanner
                </a>
                <a class="nav-link" href="reports.html">
                    <i class="bi bi-bar-chart-line"></i> Dashboard
                </a>
            </nav>
            <div class="sidebar-footer">
                <a class="btn btn-primary w-100" href="attendance.html">
                    <i class="bi bi-lightning-charge"></i> Quick Scan
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <div class="badge badge-cyan" style="margin-bottom:0.5rem;">
                        <i class="bi bi-camera"></i> Face Recognition
                    </div>
                    <h2 class="page-title">Mark Attendance</h2>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="badge badge-green" id="cameraStatus">
                        <i class="bi bi-circle-fill" style="font-size:0.5rem;"></i> Camera Active
                    </span>
                    <span class="badge" style="background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text-muted);" id="todayCount">
                        <i class="bi bi-people"></i> 0 today
                    </span>
                </div>
            </div>

            <!-- Content -->
            <div class="page-content">
                <div class="content-grid-scanner">

                    <!-- Left: Camera -->
                    <div class="card" style="display:flex;flex-direction:column;gap:1rem;">

                        <div style="display:flex;align-items:center;justify-content:space-between;">
                            <div style="display:flex;align-items:center;gap:10px;">
                                <div style="width:36px;height:36px;border-radius:10px;background:rgba(34,211,238,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                                    <i class="bi bi-webcam" style="color:var(--cyan);font-size:1rem;"></i>
                                </div>
                                <div>
                                    <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary);">Live Camera Feed</div>
                                    <div style="font-size:0.75rem;color:var(--text-muted);">Point camera at face to scan</div>
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:6px;font-size:0.72rem;font-weight:700;letter-spacing:0.05em;color:var(--cyan);">
                                <span class="live-dot" style="background:var(--cyan);box-shadow:0 0 8px var(--cyan);width:5px;height:5px;"></span>
                                LIVE
                            </div>
                        </div>

                        <!-- Camera Frame -->
                        <div class="scanner-frame" style="flex:1;min-height:360px;">
                            <video id="video" autoplay playsinline></video>

                            <!-- Animated scan line -->
                            <div id="scanLine"></div>

                            <!-- Corner brackets -->
                            <div class="scanner-corners">
                                <div class="corner tl"></div>
                                <div class="corner tr"></div>
                                <div class="corner bl"></div>
                                <div class="corner br"></div>
                            </div>

                            <!-- Centre target ring -->
                            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2;">
                                <div style="width:120px;height:120px;border-radius:50%;border:1.5px dashed rgba(34,211,238,0.25);display:flex;align-items:center;justify-content:center;">
                                    <div style="width:60px;height:60px;border-radius:50%;border:1.5px solid rgba(34,211,238,0.15);"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Scan Button -->
                        <button id="captureBtn" class="btn btn-primary w-100 btn-lg" disabled>
                            <i class="bi bi-person-check"></i> Scan &amp; Verify
                        </button>

                        <!-- Instructions -->
                        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;text-align:center;">
                            <div style="padding:0.625rem;background:var(--bg-elevated);border-radius:var(--r-md);border:1px solid var(--border);">
                                <div style="font-size:1.1rem;margin-bottom:3px;">💡</div>
                                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Good Lighting</div>
                            </div>
                            <div style="padding:0.625rem;background:var(--bg-elevated);border-radius:var(--r-md);border:1px solid var(--border);">
                                <div style="font-size:1.1rem;margin-bottom:3px;">👤</div>
                                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Face Forward</div>
                            </div>
                            <div style="padding:0.625rem;background:var(--bg-elevated);border-radius:var(--r-md);border:1px solid var(--border);">
                                <div style="font-size:1.1rem;margin-bottom:3px;">📏</div>
                                <div style="font-size:0.68rem;color:var(--text-muted);font-weight:600;">Arm's Length</div>
                            </div>
                        </div>

                    </div>

                    <!-- Right: Results + Recent -->
                    <div style="display:flex;flex-direction:column;gap:1rem;">

                        <!-- Result Card -->
                        <div class="card" style="border-top:2px solid var(--purple);">
                            <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);">
                                <i class="bi bi-check2-square" style="color:var(--purple-light);"></i>
                                <span style="font-weight:700;font-size:0.875rem;color:var(--text-primary);">Scan Result</span>
                            </div>

                            <div id="resultArea">
                                <!-- Waiting state -->
                                <div id="waitingText" class="result-idle">
                                    <div style="width:64px;height:64px;border-radius:50%;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;margin-bottom:0.5rem;animation:livePulse 3s ease infinite;">
                                        <i class="bi bi-person-bounding-box" style="font-size:1.75rem;color:var(--purple-light);opacity:0.6;"></i>
                                    </div>
                                    <span style="font-size:0.875rem;font-weight:600;">Waiting for face scan...</span>
                                    <span style="font-size:0.75rem;">Press the scan button to begin</span>
                                </div>

                                <!-- Result (shown by JS) -->
                                <div id="attendanceResult" style="display:none;text-align:center;">
                                    <div id="resultIcon" style="font-size:3.5rem;margin-bottom:0.5rem;"></div>
                                    <h3 id="resultName" style="font-size:1.25rem;font-weight:800;margin-bottom:0.25rem;color:var(--text-primary);"></h3>
                                    <p id="resultMessage" style="font-size:0.875rem;margin-bottom:1rem;font-weight:600;"></p>
                                    <div id="resultDetails" style="text-align:left;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r-md);padding:0.875rem;font-size:0.82rem;"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Recent Scans -->
                        <div class="card" style="flex:1;">
                            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:0.875rem;border-bottom:1px solid var(--border);">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <i class="bi bi-clock-history" style="color:var(--cyan);"></i>
                                    <span style="font-weight:700;font-size:0.875rem;color:var(--text-primary);">Recent Scans</span>
                                </div>
                                <span class="badge badge-cyan" id="recentCount">Today</span>
                            </div>

                            <div id="todayAttendance" style="max-height:280px;overflow-y:auto;">
                                <!-- Loading skeleton -->
                                <div style="display:flex;flex-direction:column;gap:8px;">
                                    <div style="height:52px;border-radius:var(--r-md);background:var(--bg-elevated);animation:shimmer 1.5s ease infinite;" class="skeleton-item"></div>
                                    <div style="height:52px;border-radius:var(--r-md);background:var(--bg-elevated);animation:shimmer 1.5s 0.3s ease infinite;" class="skeleton-item"></div>
                                    <div style="height:52px;border-radius:var(--r-md);background:var(--bg-elevated);animation:shimmer 1.5s 0.6s ease infinite;" class="skeleton-item"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>
            </div>

        </main>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/attendance.js"></script>

    <style>
        @keyframes shimmer {
            0%,100% { opacity:0.4; }
            50%      { opacity:0.7; }
        }
    </style>
</body>
</html>
