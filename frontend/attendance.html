<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner - Smart Attendance System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar shadow-sm">
            <a class="sidebar-brand" href="index.html">
                <i class="bi bi-person-bounding-box me-2"></i>
                Smart Attendance
            </a>
            <div class="nav flex-column px-3 py-4 gap-2 flex-grow-1">
                <a class="nav-link" href="index.html"><i class="bi bi-house me-2"></i> Home</a>
                <a class="nav-link" href="register.html"><i class="bi bi-person-plus me-2"></i> Register</a>
                <a class="nav-link active" href="attendance.html"><i class="bi bi-camera me-2"></i> Scanner</a>
                <a class="nav-link" href="reports.html"><i class="bi bi-graph-up me-2"></i> Dashboard</a>
            </div>
            <div class="p-3 mt-auto">
                <a class="btn btn-primary w-100 shadow-sm" href="attendance.html"><i class="bi bi-lightning-charge me-1"></i> Quick Scan</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content overflow-auto">

    <div class="container py-4">
        <h2 class="mb-4">Mark Attendance</h2>
        
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card h-100 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <h5 class="mb-0 text-muted"><i class="bi bi-webcam me-2 text-primary"></i> Live Camera</h5>
                        <span class="badge bg-success-light" id="cameraStatus">
                            <i class="bi bi-circle-fill me-1" style="font-size:0.5rem;"></i> Active
                        </span>
                    </div>
                    
                    <div class="text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center">
                        <div class="scanner-frame w-100 mb-4">
                            <video id="video" autoplay playsinline></video>
                        </div>
                        
                        <div class="w-100 mt-auto">
                            <button id="captureBtn" class="btn btn-primary w-100 py-2" disabled style="font-size: 1.05rem;">
                                <i class="bi bi-person-check me-1"></i> Scan & Verify
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-5">
                <div class="card mb-4" style="border-top: 4px solid var(--primary);">
                    <h5 class="mb-3 text-muted border-bottom pb-2"><i class="bi bi-check2-square me-2"></i> Result</h5>
                    <div id="resultArea" class="text-center py-2">
                        <div id="waitingText" class="text-muted py-4">
                            Waiting for face scan...
                        </div>
                        
                        <div id="attendanceResult" style="display:none; width: 100%;">
                            <div id="resultIcon" class="mb-2" style="font-size: 3.5rem;"></div>
                            <h3 id="resultName" class="mb-1 text-dark"></h3>
                            <p id="resultMessage" class="mb-3"></p>
                            <div id="resultDetails" class="mx-auto text-start bg-light p-3 rounded border"></div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                        <h5 class="mb-0 text-muted"><i class="bi bi-clock-history me-2"></i> Recent Scans</h5>
                        <span class="badge bg-primary-light" id="todayCount">0</span>
                    </div>
                    <div id="todayAttendance" style="max-height: 250px; overflow-y: auto;">
                        <div class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/attendance.js"></script>
        </main>
    </div>
</body>
</html>
