<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lectures — Scanora Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-wrapper">

    <aside class="sidebar">
        <a class="sidebar-brand" href="admin.html">
            <div class="sidebar-logo-icon"><i class="bi bi-person-bounding-box"></i></div>
            Scanora
        </a>
        <nav class="sidebar-nav"></nav>
        <div class="sidebar-footer">
            <a class="btn btn-primary w-100" href="attendance.html">
                <i class="bi bi-lightning-charge"></i> Quick Scan
            </a>
        </div>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <div>
                <a href="admin.html" style="color:var(--text-muted);text-decoration:none;font-size:0.78rem;display:inline-flex;align-items:center;gap:4px;margin-bottom:0.5rem;">
                    <i class="bi bi-arrow-left"></i> Dashboard
                </a>
                <div class="badge badge-pink" style="margin-bottom:0.5rem;">
                    <i class="bi bi-easel"></i> Lectures Module
                </div>
                <h2 class="page-title">All Lectures</h2>
            </div>
        </div>

        <!-- Filter Bar -->
        <div class="card" style="margin-bottom:1.25rem;padding:1rem 1.25rem;">
            <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
                <input type="date" class="form-control" id="dateFilter" style="width:160px;">
                <select class="form-select" id="courseFilter" style="width:200px;">
                    <option value="">All Courses</option>
                </select>
                <button class="btn btn-sm btn-primary" onclick="loadLectures()"><i class="bi bi-funnel-fill"></i> Apply</button>
                <button class="btn btn-sm btn-outline" onclick="clearFilters()"><i class="bi bi-x"></i> Clear</button>
                <span id="lectureCount" class="badge badge-pink" style="margin-left:auto;font-size:0.78rem;"></span>
            </div>
        </div>

        <!-- Lecture Cards Grid -->
        <div id="lectureGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;">
            <div class="skeleton-row" style="height:140px;"></div>
            <div class="skeleton-row" style="height:140px;"></div>
            <div class="skeleton-row" style="height:140px;"></div>
        </div>

    </main>
</div>

<!-- Attendance Detail Modal -->
<div id="attModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--r-xl);padding:1.75rem;width:100%;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.6);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
            <div>
                <div style="font-weight:800;font-size:1rem;color:var(--text-primary);" id="modalTitle">Lecture Attendance</div>
                <div style="font-size:0.75rem;color:var(--text-muted);" id="modalSubtitle"></div>
            </div>
            <button onclick="closeModal()" style="background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);border-radius:var(--r-md);padding:0.4rem 0.7rem;cursor:pointer;font-size:0.85rem;">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div id="modalContent">
            <div class="skeleton-row"></div>
        </div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/toast.js"></script>

<script>
Auth.requireRole(['admin']);
Auth.renderSidebar();

async function init() {
    try {
        const { courses } = await API.getCourses();
        const sel = document.getElementById('courseFilter');
        courses.forEach(c => {
            sel.innerHTML += `<option value="${c.id}">${c.name} (${c.code})</option>`;
        });
    } catch {}
    loadLectures();
}

function clearFilters() {
    document.getElementById('dateFilter').value = '';
    document.getElementById('courseFilter').value = '';
    loadLectures();
}

async function loadLectures() {
    const grid = document.getElementById('lectureGrid');
    grid.innerHTML = '<div class="skeleton-row" style="height:140px;"></div><div class="skeleton-row" style="height:140px;"></div><div class="skeleton-row" style="height:140px;"></div>';

    const d = document.getElementById('dateFilter').value;
    try {
        const { lectures } = await API.admin.getLectures(d || undefined);
        document.getElementById('lectureCount').textContent = `${lectures.length} lectures`;

        if (!lectures.length) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted);padding:4rem;font-size:0.85rem;">No lectures found.<br>Professors create lectures from their portal.</div>';
            return;
        }

        const courseFilter = document.getElementById('courseFilter').value;
        const filtered = courseFilter ? lectures.filter(l => l.course_id == courseFilter) : lectures;

        grid.innerHTML = filtered.map(l => `
            <div class="card" style="border-top:2px solid var(--pink);padding:1.25rem;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;"
                onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 32px rgba(0,0,0,0.35)'"
                onmouseout="this.style.transform='';this.style.boxShadow=''"
                onclick="viewAttendance(${l.id}, '${l.title.replace(/'/g, "\\'")}')">
                <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.875rem;">
                    <div style="width:40px;height:40px;border-radius:10px;background:rgba(240,101,64,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                        <i class="bi bi-easel" style="color:var(--pink);font-size:1rem;"></i>
                    </div>
                    ${l.course ? `<span class="badge badge-cyan" style="font-size:0.65rem;">${l.course.code}</span>` : ''}
                </div>
                <div style="font-weight:800;font-size:0.9rem;color:var(--text-primary);margin-bottom:4px;line-height:1.35;">${l.title}</div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.875rem;">${l.course?.name || '—'}</div>
                <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.75rem;border-top:1px solid var(--border);">
                    <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-muted);">
                        <i class="bi bi-person" style="color:var(--cyan);"></i>${l.professor_name || 'Professor'}
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--text-muted);">
                        <i class="bi bi-calendar"></i>${l.date}
                    </div>
                </div>
                <div style="margin-top:0.75rem;padding:0.5rem 0.75rem;background:rgba(244,114,182,0.07);border-radius:var(--r-sm);font-size:0.72rem;color:var(--pink);font-weight:600;text-align:center;">
                    <i class="bi bi-eye"></i> Click to view attendance
                </div>
            </div>
        `).join('');
    } catch (err) {
        grid.innerHTML = `<div style="grid-column:1/-1;color:var(--red);text-align:center;padding:2rem;">${err.message}</div>`;
    }
}

async function viewAttendance(lectureId, title) {
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalSubtitle').textContent = 'Loading attendance...';
    document.getElementById('modalContent').innerHTML = '<div class="skeleton-row"></div><div class="skeleton-row"></div>';
    document.getElementById('attModal').style.display = 'flex';

    try {
        const { records: allRecs } = await API.admin.getAttendance({});
        const allRecords = allRecs.filter(r => r.lecture_id == lectureId);

        document.getElementById('modalSubtitle').textContent = `${allRecords.length} students scanned`;

        if (!allRecords.length) {
            document.getElementById('modalContent').innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:2rem;">No students have scanned for this lecture yet.</div>';
            return;
        }

        document.getElementById('modalContent').innerHTML = `
            <table class="data-table">
                <thead>
                    <tr><th>Student</th><th>Roll No</th><th>Time</th><th>Status</th></tr>
                </thead>
                <tbody>
                    ${allRecords.map(r => `
                        <tr>
                            <td><strong style="color:var(--text-primary);">${r.student_name || '—'}</strong></td>
                            <td><span class="badge badge-purple" style="font-size:0.68rem;">${r.student_roll_no || '—'}</span></td>
                            <td style="color:var(--text-muted);font-size:0.78rem;">${r.scan_time ? new Date(r.scan_time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
                            <td><span class="status-badge status-${r.status}">${r.status}</span></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    } catch (err) {
        document.getElementById('modalContent').innerHTML = `<div style="color:var(--red);text-align:center;padding:2rem;">${err.message}</div>`;
    }
}

function closeModal() {
    document.getElementById('attModal').style.display = 'none';
}
document.getElementById('attModal').addEventListener('click', e => {
    if (e.target === document.getElementById('attModal')) closeModal();
});

init();
</script>

<style>
.btn-outline {
    background:transparent;border:1px solid var(--border);color:var(--text-secondary);
    padding:0.5rem 0.875rem;border-radius:var(--r-md);font-size:0.875rem;cursor:pointer;
    transition:border-color var(--t-base),color var(--t-base);display:inline-flex;
    align-items:center;gap:0.4rem;
}
.btn-outline:hover { border-color:var(--pink);color:var(--pink); }
</style>
</body>
</html>
