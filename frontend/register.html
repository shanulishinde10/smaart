<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Attendance System</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar shadow-sm">
            <a class="sidebar-brand" href="index.html">
                <i class="bi bi-person-bounding-box me-2"></i>
                Smart Attendance
            </a>
            <div class="nav flex-column px-3 py-4 gap-2 flex-grow-1">
                <a class="nav-link" href="index.html"><i class="bi bi-house me-2"></i> Home</a>
                <a class="nav-link active" href="register.html"><i class="bi bi-person-plus me-2"></i> Register</a>
                <a class="nav-link" href="attendance.html"><i class="bi bi-camera me-2"></i> Scanner</a>
                <a class="nav-link" href="reports.html"><i class="bi bi-graph-up me-2"></i> Dashboard</a>
            </div>
            <div class="p-3 mt-auto">
                <a class="btn btn-primary w-100 shadow-sm" href="attendance.html"><i class="bi bi-lightning-charge me-1"></i> Quick Scan</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content overflow-auto">

    <div class="container py-4">
        <div class="d-flex align-items-center mb-4">
            <h2 class="mb-0">Register Student</h2>
        </div>
        
        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card h-100">
                    <h5 class="mb-4 pb-3 border-bottom text-muted">
                        <i class="bi bi-person-lines-fill me-2 text-primary"></i> Student Information
                    </h5>
                    <form id="registerForm" class="d-flex flex-column h-100">
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" placeholder="E.g. John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="rollNo" class="form-label">Roll No / ID</label>
                            <input type="text" class="form-control" id="rollNo" placeholder="E.g. 102345" required>
                        </div>
                        <div class="mb-4">
                            <label for="department" class="form-label">Department / Class</label>
                            <select class="form-select" id="department" required>
                                <option value="" selected disabled>Select class...</option>
                                <option value="B.Tech (CS)">B.Tech (CS)</option>
                                <option value="BCA (A)">BCA (A)</option>
                                <option value="BBA">BBA</option>
                                <option value="MCA">MCA</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mt-auto" id="registerBtn" disabled>
                            <i class="bi bi-person-plus me-1"></i> <span id="registerBtnText">Complete Registration</span>
                            <span class="spinner-border spinner-border-sm d-none ms-2" id="registerSpinner" role="status"></span>
                        </button>
                    </form>
                </div>
            </div>
            
            <div class="col-lg-7">
                <div class="card h-100 d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                        <h5 class="mb-0 text-muted"><i class="bi bi-camera me-2 text-primary"></i> Face Capture</h5>
                        <span class="badge bg-success-light" id="cameraStatus"><i class="bi bi-circle-fill me-1" style="font-size:0.5rem;"></i> Active</span>
                    </div>
                    
                    <div class="text-center flex-grow-1 d-flex flex-column justify-content-center align-items-center position-relative">
                        <div class="scanner-frame w-100" id="videoWrapper">
                            <video id="video" autoplay playsinline></video>
                        </div>
                        
                        <div id="capturedPreview" class="position-absolute" style="display:none; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 10;">
                            <img id="capturedImg" class="rounded shadow-sm border" width="300" style="background:#fff;">
                            <div class="mt-2 text-success fw-bold bg-white px-3 py-1 rounded shadow-sm border">
                                <i class="bi bi-check-circle me-1"></i> Face Captured
                            </div>
                        </div>
                        
                        <div class="mt-4 w-100">
                            <button id="captureBtn" class="btn btn-outline w-100 py-2" disabled>
                                <i class="bi bi-camera me-1"></i> Capture Photo
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden canvas -->
    <canvas id="canvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/shell.js"></script>
    <script src="js/register.js"></script>
        </main>
    </div>
</body>
</html>
